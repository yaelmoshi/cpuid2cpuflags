# cpuid2cpuflags — Release pipeline
# Builds Linux binaries (glibc + musl, x86_64 + aarch64), publishes to
# crates.io, creates a GitHub release.
# Triggers on version tags (v*).
when:
  - event: tag
    ref: refs/tags/v*

steps:
  - name: build-linux-x86_64-gnu
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo build --release --locked
      - mkdir -p dist
      - cp target/release/cpuid2cpuflags dist/cpuid2cpuflags-linux-x86_64-gnu
      - tar czvf "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-x86_64-gnu.tar.gz" -C dist cpuid2cpuflags-linux-x86_64-gnu
      - sha256sum "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-x86_64-gnu.tar.gz" > "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-x86_64-gnu.sha256"
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: build-linux-x86_64-musl
    image: harbor.m0sh1.cc/apps/rust-ci:alpine-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo build --release --locked
      - cp target/release/cpuid2cpuflags dist/cpuid2cpuflags-linux-x86_64-musl
      - tar czvf "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-x86_64-musl.tar.gz" -C dist cpuid2cpuflags-linux-x86_64-musl
      - sha256sum "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-x86_64-musl.tar.gz" > "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-x86_64-musl.sha256"
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: build-linux-aarch64-gnu
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - apt-get update -qq && apt-get install -y -qq gcc-aarch64-linux-gnu libc6-dev-arm64-cross >/dev/null
      - rustup target add aarch64-unknown-linux-gnu
      - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
      - cargo build --release --locked --target aarch64-unknown-linux-gnu
      - cp target/aarch64-unknown-linux-gnu/release/cpuid2cpuflags dist/cpuid2cpuflags-linux-aarch64-gnu
      - tar czvf "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-aarch64-gnu.tar.gz" -C dist cpuid2cpuflags-linux-aarch64-gnu
      - sha256sum "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-aarch64-gnu.tar.gz" > "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-aarch64-gnu.sha256"
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: build-linux-aarch64-musl
    image: harbor.m0sh1.cc/apps/rust-ci:alpine-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - rustup target add aarch64-unknown-linux-musl
      - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C linker=rust-lld"
      - cargo build --release --locked --target aarch64-unknown-linux-musl
      - cp target/aarch64-unknown-linux-musl/release/cpuid2cpuflags dist/cpuid2cpuflags-linux-aarch64-musl
      - tar czvf "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-aarch64-musl.tar.gz" -C dist cpuid2cpuflags-linux-aarch64-musl
      - sha256sum "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-aarch64-musl.tar.gz" > "dist/cpuid2cpuflags-$CI_COMMIT_TAG-linux-aarch64-musl.sha256"
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: publish-crates
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
      CARGO_REGISTRY_TOKEN:
        from_secret: cargo_registry_token
    commands:
      - cargo publish --locked
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: github-release
    image: woodpeckerci/plugin-release@sha256:7b8cddaf649aebee4a78b278c4a3c92ec6171638211514bdf9c095000108444d
    settings:
      api_key:
        from_secret: github_token
      base_url: https://api.github.com
      title: "cpuid2cpuflags $CI_COMMIT_TAG"
      files:
        - dist/*.tar.gz
        - dist/*.sha256
